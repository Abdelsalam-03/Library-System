<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Title - Author</title>

    <style>
        *{
            transition: all 200ms ease-in-out;
        }
        body{
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            padding: 0;
            margin: 0;
        }

        header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 50px;
            background-color: #f5f5f5;
        }
        header .logo img{
            width: 50px;
            height: 50px;
        }
            
        nav{
            display: flex;
            gap: 15px;
            align-items: center;
        }
        nav button{
            background-color: rgb(116, 0, 35);
            color: white;
            padding: 5px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            height: 36px;
        }
        nav button:hover{
            background-color: rgb(152, 0, 46);
        }
        nav ul{
            display:flex;
            gap:10px;
            list-style:none;
            padding:0;
        }

        nav a{
            text-decoration: none;
            color: rgb(0, 0, 69);
            padding: 5px 12px;
            border-radius: 20px;
        }

        nav a:hover{
            background-color: rgba(0, 0, 102, 0.508);
            color: white;
        }

        .container{
            display: flex;
            flex-direction: column;
            align-items: center ;
            max-width: 100vw;
            min-height: 100vh;
        }
        .book-details{
            display: flex;
            gap: 20px;
        }
        .details p{
            color: rgb(177, 0, 59);
        }
        .details span{
            color: rgb(0, 0, 69);
            font-weight: bold;
        }

        .details button{
            background-color: rgb(0, 0, 94);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .details button:hover{
            background-color: rgb(0, 0, 125);
        }
        .book-cover{
            width: 400px;
            height: auto;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">
            <img src="/assets/logo.png" alt="logo">
        </a>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="books.html">Books</a></li>
                <li><a href="borrowed.html">Borrowed Books</a></li>
            </ul>
            <button>Log out</button>
        </nav>
    </header>

    <div class="container">
        <h2>
            Clean code in Javascript
        </h2>

        <div class="book-details">
            <img class="book-cover" src="./book-cover.avif" alt="clean-code-in-javascript"/>

            <div class="details">
                <p>
                    <span>
                        Author:
                    </span> 
                    James P.
                </p>

                <p>
                    <span>
                        Category:
                    </span> 
                    Programming
                </p>

                <p>
                    <span>
                        Status:
                    </span> 
                    Available
                </p>

                <p>
                    <span>
                        Description:
                    </span> 
                    A book about clean code in Javascript
                </p>

                <p>
                    <span>
                        Available Copies:
                    </span> 
                    10
                </p>

                <p>
                    <span>
                        Publication Year:
                    </span> 
                    2023
                </p>

                <button>Borrow</button>
            </div>
        </div>
    </div>
</body>
</html>
