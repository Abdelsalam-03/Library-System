    <link rel="stylesheet" href="/assets/css/global.css" />

    <style>
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        max-width: 100vw;
        min-height: 100vh;
      }
      .book-details {
        display: flex;
        gap: 20px;
      }
      .details p {
        color: rgb(177, 0, 59);
      }
      .details span {
        color: rgb(0, 0, 69);
        font-weight: bold;
      }

      .details button {
        background-color: rgb(0, 0, 94);
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-size: 14px;
      }

      .details button:hover {
        background-color: rgb(0, 0, 125);
      }
      .book-cover {
        width: 400px;
        height: auto;
        border-radius: 8px;
      }
    </style>
