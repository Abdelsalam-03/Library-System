<!DOCTYPE html>

<body>

<header>
  <nav>
    <ul class="nav-list">
      <li><a href="index.html">Home</a></li>

    </ul>
  </nav>
</header>

<section>
  <h1>Borrowed Books</h1>

  <table>
    <tr>
      <th>Title</th>
      <th>Author</th>
      <th>Borrowed On</th>
      <th>Due Date</th>
      <th>Actions</th>
    </tr>

    <tr>
      <td>Season of Migration to the North</td>
      <td>Tayeb Salih</td>
      <td>2026-03-10</td>
      <td>2026-03-20</td>
      <td>
        <button onclick="returnBook(this)">Return</button>
        <button onclick="renewBook(this)">Renew</button>
      </td>
    </tr>

    <tr>
      <td>Atomic Habits</td>
      <td>James Clear</td>
      <td>2026-03-05</td>
      <td>2026-03-15</td>
      <td>
        <button onclick="returnBook(this)">Return</button>
        <button onclick="renewBook(this)">Renew</button>
      </td>
    </tr>

    <tr>
      <td>The Old Man and The Sea</td>
      <td>Ernest Hemingway</td>
      <td>2026-02-20</td>
      <td>2026-03-01</td>
      <td>
        <button onclick="viewBook('The Old Man and The Sea')">View</button>
        <button onclick="reborrowBook('The Old Man and The Sea')">Reborrow</button>
      </td>
    </tr>

  </table>
</section>


<script src="borrowscript.js"></script>

</body>
</html>
