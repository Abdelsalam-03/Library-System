<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Borrowed Books</title>

  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/borrow.css">
</head>

<body>
  <script type="module" src="/components/auth/auth_guard.js"></script>
  <script type="module" src="/components/header.js"></script>

  <section>
    <h1>Borrowed Books</h1>

    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Author</th>
          <th>Borrowed On</th>
          <th>Due Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- Rows will be loaded dynamically from API -->
      </tbody>
    </table>
  </section>

  <div id="ratingModal" class="rating-modal hidden">
    <div class="rating-dialog">
      <button id="closeRatingModal" class="close-modal" type="button" aria-label="Close rating modal">&times;</button>
      <h2>Rate This Book</h2>
      <p id="ratingBookName" class="rating-book-name"></p>

      <div class="stars-group" id="starsGroup" aria-label="Book rating">
        <button type="button" class="star-btn" data-value="1">&#9733;</button>
        <button type="button" class="star-btn" data-value="2">&#9733;</button>
        <button type="button" class="star-btn" data-value="3">&#9733;</button>
        <button type="button" class="star-btn" data-value="4">&#9733;</button>
        <button type="button" class="star-btn" data-value="5">&#9733;</button>
      </div>

      <textarea id="ratingComment" rows="4" placeholder="Write a short note about the book (optional)"></textarea>

      <div class="modal-actions">
        <button id="cancelRating" type="button" class="secondary-btn">Cancel</button>
        <button id="submitRating" type="button">Submit Rating & Return</button>
      </div>
    </div>
  </div>

  <script type="module" src="/assets/js/borrow.js"></script>
  <script type="module" src="/assets/js/auth.js"></script>
</body>

</html>
