<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Books Page</title>
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/admin/view_books.css">
</head>

<body>
  <header>
    <a href="/" class="logo">
      <img src="/assets/images/logo.png" alt="logo">
    </a>

    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="view_books.html">View Books</a></li>
        <li><a href="add_book.html">Add Book</a></li>
        <li><a href="customers.html">Customers</a></li>
      </ul>
      <button>Log out</button>
    </nav>
  </header>

  <section class="books_section">
    <div class="cards">
      <div class="item" id="total">
        <p class="label">Total Books</p>
        <h3 class="value"></h3>
      </div>
      <div class="item" id="available">
        <p class="label">Available Now</p>
        <h3 class="value"></h3>
      </div>
      <div class="item" id="borrowed">
        <p class="label">Currently Borrowed</p>
        <h3 class="value"></h3>
      </div>
      <div class="item" id="genres">
        <p class="label">Total Genres</p>
        <h3 class="value"></h3>
      </div>
    </div>

    <div class="filters">
      <div class="search">
        <input type="text" placeholder="Search by title or author..." id="search">
        <button>Search</button>
      </div>

      <select class="genre" id="genre">

      </select>
      <select class="status" id="status">
        <option value="">All Statuses</option>
        <option value="available">Available</option>
        <option value="unavailable">Not Available</option>
      </select>
    </div>
    <div class="books_table_container">

      <table class="books_table" id="books_table">
        <thead>
          <tr>
            <th>Cover</th>
            <th>Title / ISBN</th>
            <th>Author</th>
            <th>Genre</th>
            <th>Year</th>
            <th>Copies</th>
            <th>Available</th>
            <th>Price</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </div>
  </section>
  <script type="module" src="/assets/js/admin/view_books.js"></script>
</body>

</html>
