<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add New Book</title>
    <link rel="stylesheet" href="/assets/css/global.css" />
    <link rel="stylesheet" href="/assets/css/admin/add_book.css" />
  </head>

  <body>
    <script type="module" src="/components/auth/admin_guard.js"></script>
    <script type="module" src="/components/header.js"></script>
    <section>
      <h2>Add New Book</h2>

      <form id="bookForm">
        <label>Title:</label>
        <input type="text" name="title" />

        <label>Author:</label>
        <input type="text" name="author" />

        <label>Genre:</label>
        <select name="genre">
          <option value="">Select Genre</option>
          <option>Fiction</option>
          <option>Non-Fiction</option>
          <option>Sci-Fi</option>
          <option>Self-Help</option>
          <option>Finance</option>
          <option>Memoir</option>
          <option>History</option>
          <option>Science</option>
          <option>Biography</option>
        </select>

        <label>isbn:</label>
        <input type="text" name="isbn" />

        <label>Publication Year:</label>
        <input type="number" name="year" />

        <label>Price ($):</label>
        <input type="number" name="price" step="0.01" />

        <label>Number of Copies:</label>
        <input type="number" name="copies" />

        <label>Book Image:</label>
        <input type="file" name="image" accept="image/*" />

        <label>Description:</label>
        <textarea name="description" rows="4"></textarea>

        <button type="reset">Clear</button>
        <button type="submit">Add Book</button>
      </form>
    </section>
    <script type="module" src="/assets/js/admin/add_book.js"></script>
  </body>
</html>
