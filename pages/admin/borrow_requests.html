<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borrow Requests</title>
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/assets/css/admin/borrow_requests.css">
</head>

<body>
    <script type="module" src="/components/is_admin.js"></script>
    <script type="module" src="/components/header.js"></script>

    <section class="requests_section">

        <div class="head">
            <h3>Borrow Requests</h3>
            <p>Manage pending book borrow requests.</p>
        </div>

        <div class="filters">
            <label for="status">Status: </label>
            <select class="status" id="status">
                <option value="pending">Pending</option>
                <option value="all">All Statuses</option>
                <option value="approved">Approved</option>
                <option value="rejected">Rejected</option>
            </select>
            <label for="sort">Sort: </label>
            <select class="sort" id="sort">
                <option value="date_desc">Newest</option>
                <option value="date_asc">Oldest</option>
            </select>
        </div>
        <div class="requests_table_container">

            <table class="requests_table" id="requests_table">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Title</th>
                        <th>Date</th>
                        <th>Available</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </section>
    <script type="module" src="/assets/js/admin/borrow_requests.js"></script>
</body>

</html>
