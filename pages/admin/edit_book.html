<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Book</title>

    <link rel="stylesheet" href="/assets/css/global.css" />
    <link rel="stylesheet" href="/assets/css/admin/add_book.css" />
  </head>

  <body>
    <script type="module" src="/components/auth/admin_guard.js"></script>
    <script type="module" src="/components/header.js"></script>

    <section>
      <h2>Edit Book</h2>

      <form id="bookForm">
        <label>Title:</label>
        <input required type="text" name="title" />

        <label>Author:</label>
        <input required type="text" name="author" />

        <label>Genre:</label>
        <select id="genre-select" name="genre">
          <option value="">Select Genre</option>
        </select>

        <label>isbn:</label>
        <input required type="text" name="isbn" />

        <label>Publication Year:</label>
        <input required type="number" name="year" />

        <label>Price ($):</label>
        <input required type="number" name="price" step="0.01" />

        <label>Number of Copies:</label>
        <input required type="number" name="copies" />

        <!-- <label>Book Image:</label>
        <input type="file" name="image" accept="image/*" /> -->

        <!-- Image preview -->
        <img
          id="preview"
          style="
            width: 100px;
            margin: 10px 0;
            display: none;
            border-radius: 8px;
          "
        />

        <label>Description:</label>
        <textarea name="description" rows="4"></textarea>

        <button type="reset">Reset</button>
        <button type="submit">Update Book</button>
      </form>
    </section>

    <script type="module" src="/assets/js/admin/edit_book.js"></script>
  </body>
</html>
